# Пример Nginx для VDSina: статика Mini App «📱 Studio» + прокси FastAPI (pm2 neuromule-api).
# Скопируйте в /etc/nginx/sites-available/neuromule и включите symlink в sites-enabled.
#
#   sudo cp scripts/nginx-neuromule-studio.example.conf /etc/nginx/sites-available/neuromule
#   sudo ln -sf /etc/nginx/sites-available/neuromule /etc/nginx/sites-enabled/neuromule
#   sudo nginx -t && sudo systemctl reload nginx
#
# Замените YOUR_DOMAIN и пути к SSL-сертификатам.

upstream neuromule_api {
    server 127.0.0.1:8000;
    keepalive 16;
}

server {
    listen 80;
    server_name YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    # certbot / Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    client_max_body_size 32m;

    # ── Mini App Studio (статика, без npm build) ─────────────────────────────
    # Корень домена = web/neuromule-table/index.html
    root /root/neuromule-bot/web/neuromule-table;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=300";
    }

    # ── FastAPI Mini App backend (pm2: neuromule-api, API_PORT=8000) ───────
    location /api/ {
        proxy_pass http://neuromule_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location = /health {
        proxy_pass http://neuromule_api/health;
        access_log off;
    }

    # ── Prometheus metrics (только localhost / basic-auth) ─────────────────
    # location /metrics/ {
    #     auth_basic "metrics";
    #     auth_basic_user_file /etc/nginx/.htpasswd-metrics;
    #     proxy_pass http://127.0.0.1:9090/;
    # }
}
