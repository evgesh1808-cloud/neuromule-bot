# Рядом с этим файлом должен быть .env (переменные в контейнер; в образ не копируется).
#
# Пути внутри контейнера: /app/data (БД), /app/logs (ротационные логи).
#
# По умолчанию — именованные Docker-тома (удобно и на Windows, и наTimeweb).
#
# Если нужно хранить файлы прямо на хосте (например /opt/neuromule для бэкапа):
# в .env задай две переменные (абсолютные пути), Перед первым запуском:
#   sudo mkdir -p /opt/neuromule/data /opt/neuromule/logs
#   NM_DATA_VOL=/opt/neuromule/data
#   NM_LOGS_VOL=/opt/neuromule/logs

services:
  neuromule-bot:
    build: .
    container_name: neuromule-bot
    restart: always
    working_dir: /app
    env_file:
      - .env
    environment:
      DB_PATH: /app/data/neuromule_base.db
      LOG_DIR: logs
    volumes:
      - ${NM_DATA_VOL:-neuromule_data}:/app/data
      - ${NM_LOGS_VOL:-neuromule_logs}:/app/logs

volumes:
  neuromule_data:
  neuromule_logs:
