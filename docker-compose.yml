services:
  neuromule:
    build: .
    image: neuromule:latest
    container_name: neuromule
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEUROMULE_PLATFORM: telegram
      DB_PATH: /app/data/neuromule_base.db
      LOG_DIR: /app/logs
    volumes:
      - neuromule_data:/app/data
      - neuromule_logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python main.py' >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  neuromule_data:
  neuromule_logs:
