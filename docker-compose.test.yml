# Тестовый PostgreSQL для PR-P Phase 1a integration-тестов.
#
# Запуск:
#   docker compose -f docker-compose.test.yml up -d
#   docker compose -f docker-compose.test.yml down -v   # сносим вместе с томом
#
# Контейнер слушает 127.0.0.1:55432 (нестандартный порт, чтобы не
# конфликтовать с потенциальным production PG на 5432).
#
# Данные хранятся в named volume `neuromule_pg_test_data`, который
# полностью сносится `down -v`. Это намеренно: тесты должны стартовать
# на чистой БД.

services:
  postgres-test:
    image: postgres:16-alpine
    container_name: neuromule_pg_test
    restart: "no"
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: neuromule_test
      # Параметры под high-load профиль (имитируем продовые настройки):
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    command:
      - "postgres"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "shared_buffers=128MB"
      - "-c"
      - "log_min_duration_statement=100"   # любой запрос >100 мс — в лог
      - "-c"
      - "log_statement=none"
      - "-c"
      - "jit=off"
    ports:
      # Привязываем строго к localhost — наружу контейнер не выставляем.
      - "127.0.0.1:55432:5432"
    volumes:
      - neuromule_pg_test_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - "CMD-SHELL"
        - "pg_isready -U test -d neuromule_test"
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s

volumes:
  neuromule_pg_test_data:
    name: neuromule_pg_test_data
