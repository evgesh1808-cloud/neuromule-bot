name: Deploy to VDSina

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VDSina via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 15m
          script: |
            set -euo pipefail
            DEPLOY_DIR="/root/neuromule-bot"
            REPO_URL="https://github.com/${{ github.repository }}.git"
            EXPECTED_SHA="${{ github.sha }}"

            echo "==> Workflow commit: ${EXPECTED_SHA}"

            for svc in neuromule-bot neuromule_bot; do
              systemctl stop "${svc}" 2>/dev/null || true
              systemctl disable "${svc}" 2>/dev/null || true
            done
            for alt in /opt/neuromule-bot /opt/neuromule; do
              if [ -d "${alt}" ] && [ "${alt}" != "${DEPLOY_DIR}" ]; then
                echo "WARN: legacy deploy dir ${alt} — останавливаем процессы"
                pkill -f "${alt}.*main.py" 2>/dev/null || true
              fi
            done
            pkill -f '[n]euromule-bot.*main.py' 2>/dev/null || true
            pkill -f '[N]EUROMULE_PLATFORM=telegram' 2>/dev/null || true

            mkdir -p "${DEPLOY_DIR}"
            cd "${DEPLOY_DIR}"

            if [ ! -d ".git" ]; then
              git clone "${REPO_URL}" .
            fi

            rm -f data/telegram_bot.lock 2>/dev/null || true
            bash scripts/vdsina-update.sh

            ACTUAL_SHA="$(git rev-parse HEAD)"
            echo "==> Server HEAD: ${ACTUAL_SHA} ($(git log -1 --oneline))"
            if [ "${ACTUAL_SHA}" != "${EXPECTED_SHA}" ]; then
              echo "WARN: HEAD != workflow SHA (возможен параллельный push)."
            fi

            echo "==> UI: $(grep -m1 'BTN_REPLY_NEUROTEXT =' content/messages.py || true)"
            pm2 logs neuromule-tg --lines 20 --nostream | grep -E 'NeuroMule build|polling started|ERROR|Traceback' || true
            echo "==> Deploy OK: $(git rev-parse --short HEAD)"
