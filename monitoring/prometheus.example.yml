# NeuroMule 🐎⚡️ — пример конфигурации Prometheus scraper'а
#
# Минимальный prometheus.yml для скрейпа metrics-эндпоинта бота
# (см. services/metrics_http.py, PR-K + PR-L).
#
# Скопируйте в /etc/prometheus/prometheus.yml вашего Prometheus-инстанса,
# подправьте targets и пути к alerts.yml.

global:
  scrape_interval: 15s
  evaluation_interval: 30s
  external_labels:
    monitor: "neuromule-prod"

rule_files:
  - /etc/prometheus/rules/neuromule_alerts.yml

scrape_configs:

  - job_name: "neuromule"
    metrics_path: /metrics
    static_configs:
      # Замените на адрес reverse-proxy с auth-basic, если бот за nginx'ом.
      # Bot слушает только loopback (127.0.0.1:METRICS_HTTP_PORT) — наружу
      # его выставляет nginx с auth-basic или mTLS.
      - targets: ["nginx-internal:9090"]
        labels:
          service: telegram-bot
          env: production

